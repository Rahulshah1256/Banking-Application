#server.port=5000

spring.datasource.url=jdbc:mysql://localhost:3306/bank_management
spring.datasource.username=root
spring.datasource.password=Stayconnected@12

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Flyway owns the schema; Hibernate only validates entity/table parity.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway database migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Serialize java.time types as ISO-8601 strings, not numeric arrays
spring.jackson.serialization.write-dates-as-timestamps=false

