app.loan.max-principal=50000000

# Deposits (Phase 7) - annual interest rates and bounds
app.deposit.fd-interest-rate=0.068
app.deposit.rd-interest-rate=0.065
app.deposit.min-tenure-months=3
app.deposit.max-tenure-months=120
app.deposit.min-amount=1000
app.deposit.premature-penalty-rate=0.01
app.deposit.scheduler-interval-milliseconds=60000

# File storage (Phase 8) - KYC docs and profile photos
app.storage.upload-dir=uploads
app.storage.max-file-size-bytes=5242880

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Cheque services (Phase 9)
app.cheque.allowed-leaves=10,25,50,100

# Notifications & Support (Phase 10)
app.notification.low-balance-threshold=1000


