app.card.online-daily-limit-default=100000
app.card.atm-daily-limit-max=100000
app.card.pos-daily-limit-max=500000
app.card.online-daily-limit-max=500000
app.card.validity-years=5

# Loans (Phase 6) - annual interest rates by loan type and tenure bounds
app.loan.home-interest-rate=0.085
app.loan.car-interest-rate=0.095
app.loan.education-interest-rate=0.105
app.loan.personal-interest-rate=0.14
app.loan.default-interest-rate=0.12
